<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --border: #e8e4df;
      --text: #1a1714;
      --muted: #9a948e;
      --income: #2d6a4f;
      --income-bg: #f0f7f4;
      --expense: #c0392b;
      --expense-bg: #fdf3f2;
      --accent: #1a1714;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      letter-spacing: -0.3px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .month-nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      transition: background 0.15s;
    }
    .month-nav button:hover { background: var(--bg); }

    #current-month {
      font-size: 14px;
      font-weight: 500;
      min-width: 110px;
      text-align: center;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-top: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    /* MAIN */
    main { padding: 20px; max-width: 500px; margin: 0 auto; }

    /* SUMMARY CARDS */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .card-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
    }

    .card-amount.income { color: var(--income); }
    .card-amount.expense { color: var(--expense); }
    .card-amount.balance { color: var(--text); }

    /* SECTION TITLE */
    .section-title {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* TRANSACTIONS LIST */
    .transactions { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .tx-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .tx-icon.income { background: var(--income-bg); }
    .tx-icon.expense { background: var(--expense-bg); }

    .tx-info { flex: 1; min-width: 0; }

    .tx-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-cat {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .tx-right { text-align: right; flex-shrink: 0; }

    .tx-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
    }

    .tx-amount.income { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }

    .tx-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .tx-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .tx-delete:hover { color: var(--expense); background: var(--expense-bg); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 40px 20px;
    }

    /* CHART */
    .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 24px; }

    .chart-title { font-size: 13px; font-weight: 500; margin-bottom: 14px; }

    .bar-chart { display: flex; flex-direction: column; gap: 10px; }

    .bar-row { display: flex; align-items: center; gap: 10px; }

    .bar-label { font-size: 12px; color: var(--muted); width: 90px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; }

    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

    .bar-fill.income { background: var(--income); }
    .bar-fill.expense { background: var(--expense); }

    .bar-value { font-size: 12px; font-weight: 500; width: 60px; text-align: right; flex-shrink: 0; }

    /* ADD FORM */
    .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }

    .form-title { font-family: 'DM Serif Display', serif; font-size: 18px; margin-bottom: 16px; }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
    }

    .type-btn.active.income { background: var(--income-bg); border-color: var(--income); color: var(--income); }
    .type-btn.active.expense { background: var(--expense-bg); border-color: var(--expense); color: var(--expense); }

    .form-group { margin-bottom: 12px; }

    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }

    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: border 0.15s;
      appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--text);
      background: var(--surface);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      margin-top: 4px;
      transition: opacity 0.15s;
      letter-spacing: 0.2px;
    }

    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:active { opacity: 0.7; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .stat-label { font-size: 12px; color: var(--muted); }

    /* HISTORY (month overview) */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--text); }
    .history-month { font-weight: 500; font-size: 14px; }
    .history-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .history-balance { font-family: 'DM Serif Display', serif; font-size: 16px; }
    .history-balance.pos { color: var(--income); }
    .history-balance.neg { color: var(--expense); }

    /* PAGE VISIBILITY */
    .page { display: none; }
    .page.active { display: block; }

    /* BOTTOM NAV */
    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 env(safe-area-inset-bottom, 8px);
      z-index: 200;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: color 0.15s;
    }

    .nav-btn.active { color: var(--text); }

    .nav-icon { font-size: 20px; line-height: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Budget</h1>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="current-month"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('transactions', this)">Transactions</div>
    <div class="tab" onclick="showTab('stats', this)">Statistiques</div>
    <div class="tab" onclick="showTab('history', this)">Historique</div>
  </div>
</header>

<main>

  <!-- TRANSACTIONS PAGE -->
  <div id="page-transactions" class="page active">
    <div class="summary">
      <div class="card">
        <div class="card-label">Revenus</div>
        <div class="card-amount income" id="total-income">0 €</div>
      </div>
      <div class="card">
        <div class="card-label">Dépenses</div>
        <div class="card-amount expense" id="total-expense">0 €</div>
      </div>
      <div class="card">
        <div class="card-label">Solde</div>
        <div class="card-amount balance" id="total-balance">0 €</div>
      </div>
    </div>

    <div class="section-title">Ce mois</div>
    <div class="transactions" id="tx-list"></div>
  </div>

  <!-- STATS PAGE -->
  <div id="page-stats" class="page">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-section">
      <div class="chart-title">Dépenses par catégorie</div>
      <div class="bar-chart" id="expense-chart"></div>
    </div>
    <div class="chart-section">
      <div class="chart-title">Revenus par catégorie</div>
      <div class="bar-chart" id="income-chart"></div>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div id="page-history" class="page">
    <div class="section-title">Tous les mois</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- ADD PAGE -->
  <div id="page-add" class="page">
    <div class="add-form">
      <div class="form-title">Nouvelle entrée</div>

      <div class="type-toggle">
        <button class="type-btn active expense" id="btn-expense" onclick="setType('expense')">— Dépense</button>
        <button class="type-btn income" id="btn-income" onclick="setType('income')">+ Revenu</button>
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="f-name" placeholder="ex: Courses, Loyer..." />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Montant (€)</label>
          <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
      </div>

      <div class="form-group">
        <label>Catégorie</label>
        <select id="f-cat"></select>
      </div>

      <button class="submit-btn" onclick="addTransaction()">Ajouter</button>
    </div>
  </div>

</main>

<nav>
  <button class="nav-btn active" id="nav-transactions" onclick="showPage('transactions', this)">
    <span class="nav-icon">📋</span>Liste
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showPage('stats', this)">
    <span class="nav-icon">📊</span>Stats
  </button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history', this)">
    <span class="nav-icon">📅</span>Historique
  </button>
  <button class="nav-btn" id="nav-add" onclick="showPage('add', this)">
    <span class="nav-icon">＋</span>Ajouter
  </button>
</nav>

<script>
  // ——————————————————————————————————————————
  // DATA
  // ——————————————————————————————————————————
  const CATEGORIES = {
    expense: [
      { id: 'alimentation', label: 'Alimentation', icon: '🛒' },
      { id: 'logement', label: 'Logement', icon: '🏠' },
      { id: 'transport', label: 'Transport', icon: '🚗' },
      { id: 'sante', label: 'Santé', icon: '💊' },
      { id: 'loisirs', label: 'Loisirs', icon: '🎉' },
      { id: 'vetements', label: 'Vêtements', icon: '👕' },
      { id: 'abonnements', label: 'Abonnements', icon: '📱' },
      { id: 'restaurants', label: 'Restaurants', icon: '🍽️' },
      { id: 'autre_dep', label: 'Autre', icon: '📦' },
    ],
    income: [
      { id: 'salaire', label: 'Salaire', icon: '💼' },
      { id: 'freelance', label: 'Freelance', icon: '💻' },
      { id: 'aides', label: 'Aides / APL', icon: '🏛️' },
      { id: 'remboursement', label: 'Remboursement', icon: '↩️' },
      { id: 'autre_rev', label: 'Autre', icon: '💰' },
    ],
  };

  let transactions = JSON.parse(localStorage.getItem('budget_tx') || '[]');
  let currentType = 'expense';
  let viewDate = new Date();

  function save() { localStorage.setItem('budget_tx', JSON.stringify(transactions)); }

  // ——————————————————————————————————————————
  // HELPERS
  // ——————————————————————————————————————————
  function fmt(n) { return (n).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }
  function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
  function monthLabel(d) {
    return d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
  }
  function getCat(type, id) {
    return CATEGORIES[type].find(c => c.id === id) || { label: id, icon: '•' };
  }

  function txForMonth(key) {
    return transactions.filter(t => t.date.startsWith(key));
  }

  function sumIncome(list) { return list.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0); }
  function sumExpense(list) { return list.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0); }

  // ——————————————————————————————————————————
  // MONTH NAV
  // ——————————————————————————————————————————
  function changeMonth(dir) {
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + dir, 1);
    renderAll();
  }

  function updateMonthLabel() {
    document.getElementById('current-month').textContent =
      viewDate.toLocaleDateString('fr-FR', { month: 'short', year: 'numeric' });
  }

  // ——————————————————————————————————————————
  // TABS / PAGES
  // ——————————————————————————————————————————
  function showTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function showPage(name, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    el.classList.add('active');
    if (name === 'add') initForm();
    renderAll();
  }

  // ——————————————————————————————————————————
  // FORM
  // ——————————————————————————————————————————
  function initForm() {
    const sel = document.getElementById('f-cat');
    sel.innerHTML = '';
    CATEGORIES[currentType].forEach(c => {
      sel.innerHTML += `<option value="${c.id}">${c.icon} ${c.label}</option>`;
    });
    // default date = today
    const today = new Date();
    document.getElementById('f-date').value = today.toISOString().slice(0,10);
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btn-expense').classList.toggle('active', type === 'expense');
    document.getElementById('btn-income').classList.toggle('active', type === 'income');
    initForm();
  }

  function addTransaction() {
    const name = document.getElementById('f-name').value.trim();
    const amount = parseFloat(document.getElementById('f-amount').value);
    const date = document.getElementById('f-date').value;
    const cat = document.getElementById('f-cat').value;

    if (!name || isNaN(amount) || amount <= 0 || !date) {
      alert('Merci de remplir tous les champs.');
      return;
    }

    transactions.push({ id: Date.now(), type: currentType, name, amount, date, cat });
    transactions.sort((a,b) => b.date.localeCompare(a.date));
    save();

    document.getElementById('f-name').value = '';
    document.getElementById('f-amount').value = '';
    showPage('transactions', document.getElementById('nav-transactions'));
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    renderAll();
  }

  // ——————————————————————————————————————————
  // RENDER TRANSACTIONS
  // ——————————————————————————————————————————
  function renderTransactions() {
    const key = monthKey(viewDate);
    const list = txForMonth(key);
    const inc = sumIncome(list);
    const exp = sumExpense(list);
    const bal = inc - exp;

    document.getElementById('total-income').textContent = fmt(inc);
    document.getElementById('total-expense').textContent = fmt(exp);
    const balEl = document.getElementById('total-balance');
    balEl.textContent = fmt(bal);
    balEl.style.color = bal >= 0 ? 'var(--income)' : 'var(--expense)';

    const container = document.getElementById('tx-list');
    if (list.length === 0) {
      container.innerHTML = `<div class="empty-state">Aucune transaction ce mois.</div>`;
      return;
    }
    container.innerHTML = list.map(t => {
      const cat = getCat(t.type, t.cat);
      const d = new Date(t.date + 'T00:00:00');
      const dateStr = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
      return `
        <div class="tx-item">
          <div class="tx-icon ${t.type}">${cat.icon}</div>
          <div class="tx-info">
            <div class="tx-name">${t.name}</div>
            <div class="tx-cat">${cat.label}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '−'} ${fmt(t.amount)}</div>
            <div class="tx-date">${dateStr}</div>
          </div>
          <button class="tx-delete" onclick="deleteTransaction(${t.id})" title="Supprimer">×</button>
        </div>`;
    }).join('');
  }

  // ——————————————————————————————————————————
  // RENDER STATS
  // ——————————————————————————————————————————
  function renderStats() {
    const key = monthKey(viewDate);
    const list = txForMonth(key);
    const inc = sumIncome(list);
    const exp = sumExpense(list);
    const bal = inc - exp;
    const txCount = list.length;

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-value" style="color:var(--income)">${fmt(inc)}</div><div class="stat-label">Total revenus</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--expense)">${fmt(exp)}</div><div class="stat-label">Total dépenses</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${bal>=0?'var(--income)':'var(--expense)'}">${fmt(bal)}</div><div class="stat-label">Solde net</div></div>
      <div class="stat-card"><div class="stat-value">${txCount}</div><div class="stat-label">Transactions</div></div>
    `;

    function renderBarChart(containerId, type, total) {
      const container = document.getElementById(containerId);
      const cats = {};
      list.filter(t => t.type === type).forEach(t => {
        cats[t.cat] = (cats[t.cat] || 0) + t.amount;
      });
      const entries = Object.entries(cats).sort((a,b) => b[1]-a[1]);
      if (entries.length === 0) { container.innerHTML = '<div style="font-size:13px;color:var(--muted)">Aucune donnée</div>'; return; }
      container.innerHTML = entries.map(([catId, sum]) => {
        const cat = getCat(type, catId);
        const pct = total > 0 ? (sum / total * 100) : 0;
        return `
          <div class="bar-row">
            <div class="bar-label">${cat.icon} ${cat.label}</div>
            <div class="bar-track"><div class="bar-fill ${type}" style="width:${pct}%"></div></div>
            <div class="bar-value">${fmt(sum)}</div>
          </div>`;
      }).join('');
    }

    renderBarChart('expense-chart', 'expense', exp);
    renderBarChart('income-chart', 'income', inc);
  }

  // ——————————————————————————————————————————
  // RENDER HISTORY
  // ——————————————————————————————————————————
  function renderHistory() {
    const months = {};
    transactions.forEach(t => {
      const k = t.date.slice(0,7);
      if (!months[k]) months[k] = [];
      months[k].push(t);
    });
    const keys = Object.keys(months).sort().reverse();
    const container = document.getElementById('history-list');
    if (keys.length === 0) {
      container.innerHTML = `<div class="empty-state">Aucun historique disponible.</div>`;
      return;
    }
    container.innerHTML = keys.map(k => {
      const list = months[k];
      const inc = sumIncome(list);
      const exp = sumExpense(list);
      const bal = inc - exp;
      const [y, m] = k.split('-');
      const label = new Date(y, m-1, 1).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
      return `<div class="history-item">
        <div>
          <div class="history-month">${label}</div>
          <div class="history-sub">${list.length} transaction${list.length > 1 ? 's' : ''} · Dépenses ${fmt(exp)}</div>
        </div>
        <div class="history-balance ${bal >= 0 ? 'pos' : 'neg'}">${bal >= 0 ? '+' : ''}${fmt(bal)}</div>
      </div>`;
    }).join('');
  }

  // ——————————————————————————————————————————
  // MASTER RENDER
  // ——————————————————————————————————————————
  function renderAll() {
    updateMonthLabel();
    renderTransactions();
    renderStats();
    renderHistory();
  }

  // INIT
  initForm();
  renderAll();
</script>
</body>
</html>
