<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f2f7;
      --surface: #ffffff;
      --border: #e5e5ea;
      --text: #1c1c1e;
      --text2: #3a3a3c;
      --muted: #8e8e93;
      --green: #34c759;
      --green-bg: #f0faf3;
      --red: #ff3b30;
      --red-bg: #fff5f4;
      --blue: #007aff;
      --radius: 14px;
      --nav-h: 82px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: var(--nav-h);
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .app-header {
      background: rgba(242,242,247,0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 52px 20px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .app-title { font-size:28px; font-weight:700; letter-spacing:-0.5px; }
    .month-nav { display:flex; align-items:center; gap:2px; background:var(--surface); border-radius:10px; padding:4px 6px; }
    .month-nav button { background:none; border:none; width:28px; height:28px; cursor:pointer; font-size:16px; color:var(--blue); display:flex; align-items:center; justify-content:center; border-radius:6px; }
    #current-month { font-size:13px; font-weight:600; min-width:90px; text-align:center; }

    /* SEGMENTED */
    .segmented { display:flex; background:var(--surface); border-radius:10px; padding:3px; margin-bottom:14px; gap:2px; }
    .seg-btn { flex:1; padding:7px 0; border:none; border-radius:8px; background:none; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
    .seg-btn.active { background:var(--bg); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.1); }

    /* MAIN */
    main { padding:14px 16px 0; max-width:500px; margin:0 auto; }
    .page { display:none; }
    .page.active { display:block; }

    /* HERO CARD */
    .hero-card { background:var(--text); border-radius:20px; padding:24px 20px 20px; margin-bottom:12px; color:white; position:relative; overflow:hidden; }
    .hero-card::before { content:''; position:absolute; top:-50px; right:-50px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.04); }
    .hero-label { font-size:12px; font-weight:500; color:rgba(255,255,255,.45); text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; }
    .hero-amount { font-size:38px; font-weight:700; letter-spacing:-1px; margin-bottom:18px; }
    .hero-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .hero-stat-label { font-size:11px; color:rgba(255,255,255,.4); font-weight:500; margin-bottom:3px; }
    .hero-stat-value { font-size:16px; font-weight:700; }
    .hero-stat-value.pos { color:#30d158; }
    .hero-stat-value.neg { color:#ff6b6b; }

    /* LIST GROUP */
    .list-group { background:var(--surface); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
    .list-group-header { padding:11px 16px 5px; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
    .tx-row { display:flex; align-items:center; padding:11px 14px; gap:12px; border-top:1px solid var(--border); animation:fadeUp .18s ease; }
    .tx-row:first-of-type { border-top:none; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .tx-icon { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
    .tx-icon.income { background:var(--green-bg); }
    .tx-icon.expense { background:var(--red-bg); }
    .tx-info { flex:1; min-width:0; }
    .tx-name { font-size:15px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tx-sub { font-size:12px; color:var(--muted); margin-top:1px; }
    .tx-right { text-align:right; flex-shrink:0; }
    .tx-amount { font-size:15px; font-weight:600; }
    .tx-amount.income { color:var(--green); }
    .tx-amount.expense { color:var(--red); }
    .tx-del { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; line-height:1; border-radius:6px; flex-shrink:0; }

    /* EMPTY */
    .empty-state { text-align:center; color:var(--muted); font-size:14px; padding:48px 20px; }
    .empty-icon { font-size:36px; margin-bottom:10px; }

    /* STATS */
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .stat-tile { background:var(--surface); border-radius:var(--radius); padding:16px; }
    .stat-tile-value { font-size:20px; font-weight:700; letter-spacing:-.3px; margin-bottom:3px; }
    .stat-tile-label { font-size:12px; color:var(--muted); font-weight:500; }
    .chart-card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
    .chart-card-title { font-size:13px; font-weight:600; color:var(--text2); margin-bottom:14px; }
    .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .bar-row:last-child { margin-bottom:0; }
    .bar-lbl { font-size:12px; color:var(--muted); width:88px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bar-track { flex:1; height:6px; background:var(--bg); border-radius:99px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:99px; transition:width .5s ease; }
    .bar-fill.income { background:var(--green); }
    .bar-fill.expense { background:var(--red); }
    .bar-val { font-size:12px; font-weight:600; width:58px; text-align:right; flex-shrink:0; }

    /* HISTORY */
    .history-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-top:1px solid var(--border); }
    .history-row:first-of-type { border-top:none; }
    .history-month { font-size:15px; font-weight:500; }
    .history-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .history-bal { font-size:15px; font-weight:700; }
    .history-bal.pos { color:var(--green); }
    .history-bal.neg { color:var(--red); }

    /* FAB */
    .fab { position:fixed; bottom:calc(var(--nav-h) + 14px); right:20px; width:52px; height:52px; border-radius:50%; background:var(--blue); color:white; border:none; font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,122,255,.4); z-index:90; transition:transform .15s; }
    .fab:active { transform:scale(.93); }

    /* NAV */
    nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:rgba(255,255,255,.94); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:flex-start; padding-top:10px; z-index:200; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer; padding:0; font-family:'Inter',sans-serif; }
    .nav-icon-wrap { width:44px; height:30px; display:flex; align-items:center; justify-content:center; }
    .nav-icon-wrap svg { width:24px; height:24px; stroke:var(--muted); fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; transition:stroke .15s; }
    .nav-item.active .nav-icon-wrap svg { stroke:var(--blue); }
    .nav-label { font-size:10px; font-weight:500; color:var(--muted); transition:color .15s; }
    .nav-item.active .nav-label { color:var(--blue); }

    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500; align-items:flex-end; }
    .modal-overlay.open { display:flex; }
    .modal-sheet { background:var(--surface); border-radius:20px 20px 0 0; padding:0 0 40px; width:100%; max-height:92vh; overflow-y:auto; animation:slideUp .28s cubic-bezier(.32,1.1,.68,1); }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:none;opacity:1} }
    .modal-handle { width:36px; height:4px; background:var(--border); border-radius:99px; margin:12px auto 0; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px 12px; }
    .modal-title { font-size:17px; font-weight:700; }
    .modal-close { background:var(--bg); border:none; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:16px; color:var(--muted); display:flex; align-items:center; justify-content:center; }
    .modal-body { padding:0 20px; }

    /* FORM */
    .type-pills { display:flex; gap:8px; margin-bottom:16px; }
    .type-pill { flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; color:var(--muted); transition:all .15s; }
    .type-pill.active.dep { background:#fff1f0; border-color:var(--red); color:var(--red); }
    .type-pill.active.rev { background:#f0faf3; border-color:var(--green); color:var(--green); }
    .form-field { margin-bottom:12px; }
    .form-label { display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    input, select { width:100%; padding:13px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); -webkit-appearance:none; transition:border-color .15s; }
    input:focus, select:focus { outline:none; border-color:var(--blue); background:var(--surface); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn-primary { width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; margin-top:6px; transition:opacity .15s; }
    .btn-primary:active { opacity:.8; }

    /* LOYALTY */
    .loyalty-grid { display:flex; flex-direction:column; gap:10px; }
    .loyalty-card { border-radius:18px; padding:22px 20px 18px; color:white; cursor:pointer; position:relative; overflow:hidden; min-height:108px; display:flex; flex-direction:column; justify-content:space-between; transition:transform .12s; }
    .loyalty-card:active { transform:scale(.97); }
    .loyalty-card::after { content:''; position:absolute; bottom:-20px; right:-20px; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,.07); }
    .loy-name { font-size:17px; font-weight:600; }
    .loy-code { font-size:12px; color:rgba(255,255,255,.5); font-family:monospace; letter-spacing:1.5px; margin-top:3px; }
    .loy-type { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.35); }
    .loy-delete { position:absolute; top:12px; right:12px; background:rgba(255,255,255,.15); border:none; color:rgba(255,255,255,.7); width:26px; height:26px; border-radius:50%; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .add-card-btn { width:100%; padding:16px; border:1.5px dashed var(--border); border-radius:18px; background:none; color:var(--muted); font-size:14px; font-weight:500; font-family:'Inter',sans-serif; cursor:pointer; transition:border-color .15s,color .15s; }
    .add-card-btn:active { border-color:var(--blue); color:var(--blue); }
    .code-type-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .code-type-btn { padding:12px 8px; border:1.5px solid var(--border); border-radius:10px; background:var(--bg); cursor:pointer; font-size:12px; font-weight:600; font-family:'Inter',sans-serif; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:6px; transition:all .15s; }
    .code-type-btn .cicon { font-size:20px; }
    .code-type-btn.active { background:#f0f6ff; border-color:var(--blue); color:var(--blue); }

    /* BARCODE MODAL */
    .barcode-wrap { background:white; border-radius:12px; padding:20px 16px 12px; margin:0 auto 16px; display:inline-block; }
    .barcode-num { font-family:monospace; font-size:13px; color:#444; margin-top:8px; text-align:center; letter-spacing:2px; }
    .qr-wrap { background:white; border-radius:12px; padding:16px; margin:0 auto 16px; display:inline-block; }

    /* CARD PALETTE */
    .cc0 { background:linear-gradient(135deg,#1c1c1e,#3a3a3c); }
    .cc1 { background:linear-gradient(135deg,#1a3a5c,#2d6a9f); }
    .cc2 { background:linear-gradient(135deg,#2d4a1e,#4a7c2f); }
    .cc3 { background:linear-gradient(135deg,#4a1a1a,#8b2e2e); }
    .cc4 { background:linear-gradient(135deg,#2d1a4a,#5a3a8a); }
    .cc5 { background:linear-gradient(135deg,#1a3a3a,#2d6a6a); }
  </style>
</head>
<body>

<div class="app-header" id="app-header">
  <div class="header-row">
    <div class="app-title" id="header-title">Budget</div>
    <div class="month-nav" id="month-nav-wrap">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="current-month"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="segmented" id="budget-tabs">
    <button class="seg-btn active" onclick="showBudgetTab('transactions',this)">Transactions</button>
    <button class="seg-btn" onclick="showBudgetTab('stats',this)">Statistiques</button>
    <button class="seg-btn" onclick="showBudgetTab('history',this)">Historique</button>
  </div>
</div>

<main>
  <!-- BUDGET -->
  <div id="section-budget" class="page active">
    <div id="tab-transactions" class="page active">
      <div class="hero-card">
        <div class="hero-label">Solde du mois</div>
        <div class="hero-amount" id="hero-balance">0,00 €</div>
        <div class="hero-row">
          <div>
            <div class="hero-stat-label">↑ Revenus</div>
            <div class="hero-stat-value pos" id="hero-income">0,00 €</div>
          </div>
          <div>
            <div class="hero-stat-label">↓ Dépenses</div>
            <div class="hero-stat-value neg" id="hero-expense">0,00 €</div>
          </div>
        </div>
      </div>
      <div id="tx-container"></div>
    </div>
    <div id="tab-stats" class="page">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="chart-card"><div class="chart-card-title">Dépenses par catégorie</div><div id="expense-chart"></div></div>
      <div class="chart-card"><div class="chart-card-title">Revenus par catégorie</div><div id="income-chart"></div></div>
    </div>
    <div id="tab-history" class="page">
      <div class="list-group" id="history-list"></div>
    </div>
  </div>

  <!-- FIDÉLITÉ -->
  <div id="section-fidelite" class="page">
    <div class="loyalty-grid" id="loyalty-list" style="margin-bottom:12px"></div>
    <button class="add-card-btn" onclick="openAddLoyalty()">＋  Ajouter une carte</button>
  </div>
</main>

<button class="fab" id="fab-add" onclick="openAddTx()">＋</button>

<nav>
  <button class="nav-item active" id="nav-budget" onclick="showSection('budget',this)">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="7" cy="15" r="1" fill="currentColor" stroke="none"/><path d="M11 15h6"/></svg>
    </div>
    <span class="nav-label">Budget</span>
  </button>
  <button class="nav-item" id="nav-fidelite" onclick="showSection('fidelite',this)">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 00-8 0v2"/><circle cx="12" cy="13" r="2"/><path d="M12 15v2"/></svg>
    </div>
    <span class="nav-label">Fidélité</span>
  </button>
</nav>

<!-- MODAL ADD TX -->
<div class="modal-overlay" id="modal-add-tx" onclick="closeIfOutside(event,'modal-add-tx')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Nouvelle entrée</div>
      <button class="modal-close" onclick="closeModal('modal-add-tx')">✕</button>
    </div>
    <div class="modal-body">
      <div class="type-pills">
        <button class="type-pill active dep" id="pill-dep" onclick="setTxType('expense')">− Dépense</button>
        <button class="type-pill rev" id="pill-rev" onclick="setTxType('income')">＋ Revenu</button>
      </div>
      <div class="form-field"><label class="form-label">Description</label><input type="text" id="f-name" placeholder="ex : Courses, Loyer…"/></div>
      <div class="form-row">
        <div class="form-field"><label class="form-label">Montant (€)</label><input type="number" id="f-amount" placeholder="0,00" min="0" step="0.01"/></div>
        <div class="form-field"><label class="form-label">Date</label><input type="date" id="f-date"/></div>
      </div>
      <div class="form-field"><label class="form-label">Catégorie</label><select id="f-cat"></select></div>
      <button class="btn-primary" onclick="addTx()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL ADD LOYALTY -->
<div class="modal-overlay" id="modal-add-loyalty" onclick="closeIfOutside(event,'modal-add-loyalty')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Nouvelle carte</div>
      <button class="modal-close" onclick="closeModal('modal-add-loyalty')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">Nom de la carte</label><input type="text" id="loy-name" placeholder="ex : Intermarché, Fnac…"/></div>
      <div class="form-field">
        <label class="form-label">Type de code</label>
        <div class="code-type-grid">
          <button class="code-type-btn active" id="loy-btn-barcode" onclick="setCodeType('barcode')"><span class="cicon">▐▌▐▌▐</span>Code barre</button>
          <button class="code-type-btn" id="loy-btn-qr" onclick="setCodeType('qr')"><span class="cicon">⊞</span>QR Code</button>
        </div>
      </div>
      <div class="form-field"><label class="form-label">Numéro / Code</label><input type="text" id="loy-code" placeholder="Saisir le numéro de carte…"/></div>
      <button class="btn-primary" onclick="saveLoyaltyCard()">Créer la carte</button>
    </div>
  </div>
</div>

<!-- MODAL SHOW LOYALTY CODE -->
<div class="modal-overlay" id="modal-show-loyalty" onclick="closeIfOutside(event,'modal-show-loyalty')">
  <div class="modal-sheet" style="text-align:center">
    <div class="modal-handle"></div>
    <div class="modal-header" style="justify-content:center;position:relative;">
      <div class="modal-title" id="show-loy-title"></div>
      <button class="modal-close" onclick="closeModal('modal-show-loyalty')" style="position:absolute;right:20px;">✕</button>
    </div>
    <div class="modal-body" id="show-loy-content" style="padding-bottom:20px;"></div>
  </div>
</div>

<script>
const CATS = {
  expense:[
    {id:'alimentation',label:'Alimentation',icon:'🛒'},
    {id:'logement',label:'Logement',icon:'🏠'},
    {id:'transport',label:'Transport',icon:'🚗'},
    {id:'sante',label:'Santé',icon:'💊'},
    {id:'loisirs',label:'Loisirs',icon:'🎉'},
    {id:'vetements',label:'Vêtements',icon:'👕'},
    {id:'abonnements',label:'Abonnements',icon:'📱'},
    {id:'restaurants',label:'Restaurants',icon:'🍽️'},
    {id:'autre',label:'Autre',icon:'📦'},
  ],
  income:[
    {id:'salaire',label:'Salaire',icon:'💼'},
    {id:'freelance',label:'Freelance',icon:'💻'},
    {id:'aides',label:'Aides / APL',icon:'🏛️'},
    {id:'remboursement',label:'Remboursement',icon:'↩️'},
    {id:'autre',label:'Autre',icon:'💰'},
  ],
};

let transactions  = JSON.parse(localStorage.getItem('bgt_tx') || '[]');
let loyaltyCards  = JSON.parse(localStorage.getItem('bgt_loy') || '[]');
let viewDate      = new Date();
let currentTxType = 'expense';
let loyCodeType   = 'barcode';

const saveTx  = () => localStorage.setItem('bgt_tx',  JSON.stringify(transactions));
const saveLoy = () => localStorage.setItem('bgt_loy', JSON.stringify(loyaltyCards));

// Helpers
const fmt = n => n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const monthKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const getCat   = (type,id) => CATS[type].find(c=>c.id===id)||{label:id,icon:'•'};
const txForMonth = key => transactions.filter(t=>t.date.startsWith(key));
const sumIncome  = l => l.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
const sumExpense = l => l.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

// ---- NAVIGATION ----
function showSection(name, el) {
  document.querySelectorAll('.page[id^=section-]').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  el.classList.add('active');
  const isBudget = name==='budget';
  document.getElementById('header-title').textContent = isBudget ? 'Budget' : 'Fidélité';
  document.getElementById('budget-tabs').style.display  = isBudget ? 'flex' : 'none';
  document.getElementById('month-nav-wrap').style.display = isBudget ? 'flex' : 'none';
  document.getElementById('fab-add').style.display = isBudget ? 'flex' : 'none';
  if (!isBudget) renderLoyalty();
}

function showBudgetTab(name, el) {
  document.querySelectorAll('#section-budget .page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  render();
}

// ---- MONTH ----
function changeMonth(dir) { viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+dir,1); render(); }
function updateMonthLabel() { document.getElementById('current-month').textContent=viewDate.toLocaleDateString('fr-FR',{month:'short',year:'numeric'}); }

// ---- RENDER TX ----
function renderTransactions() {
  const key=monthKey(viewDate), list=txForMonth(key);
  const inc=sumIncome(list), exp=sumExpense(list), bal=inc-exp;
  document.getElementById('hero-income').textContent=fmt(inc);
  document.getElementById('hero-expense').textContent=fmt(exp);
  const hb=document.getElementById('hero-balance');
  hb.textContent=fmt(bal); hb.style.color=bal<0?'#ff6b6b':'white';
  const c=document.getElementById('tx-container');
  if(!list.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon">💸</div>Aucune transaction ce mois.</div>`;return;}
  const groups={};
  list.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});
  c.innerHTML=Object.entries(groups).sort(([a],[b])=>b.localeCompare(a)).map(([date,items])=>{
    const d=new Date(date+'T00:00:00');
    const lbl=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    const rows=items.map(t=>{
      const cat=getCat(t.type,t.cat);
      return `<div class="tx-row">
        <div class="tx-icon ${t.type}">${cat.icon}</div>
        <div class="tx-info"><div class="tx-name">${t.name}</div><div class="tx-sub">${cat.label}</div></div>
        <div class="tx-right"><div class="tx-amount ${t.type}">${t.type==='income'?'+':'−'} ${fmt(t.amount)}</div></div>
        <button class="tx-del" onclick="deleteTx(${t.id})">×</button>
      </div>`;
    }).join('');
    return `<div class="list-group"><div class="list-group-header">${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</div>${rows}</div>`;
  }).join('');
}

function deleteTx(id){transactions=transactions.filter(t=>t.id!==id);saveTx();render();}

// ---- RENDER STATS ----
function renderStats() {
  const key=monthKey(viewDate),list=txForMonth(key);
  const inc=sumIncome(list),exp=sumExpense(list),bal=inc-exp;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-tile"><div class="stat-tile-value" style="color:var(--green)">${fmt(inc)}</div><div class="stat-tile-label">Revenus</div></div>
    <div class="stat-tile"><div class="stat-tile-value" style="color:var(--red)">${fmt(exp)}</div><div class="stat-tile-label">Dépenses</div></div>
    <div class="stat-tile"><div class="stat-tile-value" style="color:${bal>=0?'var(--green)':'var(--red)'}">${fmt(bal)}</div><div class="stat-tile-label">Solde net</div></div>
    <div class="stat-tile"><div class="stat-tile-value">${list.length}</div><div class="stat-tile-label">Transactions</div></div>`;
  const renderChart=(elId,type,total)=>{
    const el=document.getElementById(elId),map={};
    list.filter(t=>t.type===type).forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount;});
    const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    if(!entries.length){el.innerHTML='<div style="font-size:13px;color:var(--muted)">Aucune donnée</div>';return;}
    el.innerHTML=entries.map(([id,sum])=>{
      const cat=getCat(type,id),pct=total>0?sum/total*100:0;
      return `<div class="bar-row"><div class="bar-lbl">${cat.icon} ${cat.label}</div><div class="bar-track"><div class="bar-fill ${type}" style="width:${pct}%"></div></div><div class="bar-val">${fmt(sum)}</div></div>`;
    }).join('');
  };
  renderChart('expense-chart','expense',exp);
  renderChart('income-chart','income',inc);
}

// ---- RENDER HISTORY ----
function renderHistory(){
  const months={};
  transactions.forEach(t=>{const k=t.date.slice(0,7);if(!months[k])months[k]=[];months[k].push(t);});
  const keys=Object.keys(months).sort().reverse();
  const el=document.getElementById('history-list');
  if(!keys.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div>Aucun historique.</div>`;return;}
  el.innerHTML=keys.map(k=>{
    const l=months[k],inc=sumIncome(l),exp=sumExpense(l),bal=inc-exp;
    const [y,m]=k.split('-');
    const lbl=new Date(y,m-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
    return `<div class="history-row"><div><div class="history-month">${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</div><div class="history-sub">${l.length} transaction${l.length>1?'s':''} · dép. ${fmt(exp)}</div></div><div class="history-bal ${bal>=0?'pos':'neg'}">${bal>=0?'+':''}${fmt(bal)}</div></div>`;
  }).join('');
}

function render(){updateMonthLabel();renderTransactions();renderStats();renderHistory();}

// ---- ADD TX ----
function openAddTx(){
  document.getElementById('f-name').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  setTxType('expense');
  document.getElementById('modal-add-tx').classList.add('open');
}
function setTxType(type){
  currentTxType=type;
  document.getElementById('pill-dep').classList.toggle('active',type==='expense');
  document.getElementById('pill-rev').classList.toggle('active',type==='income');
  document.getElementById('f-cat').innerHTML=CATS[type].map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
}
function addTx(){
  const name=document.getElementById('f-name').value.trim();
  const amount=parseFloat(document.getElementById('f-amount').value);
  const date=document.getElementById('f-date').value;
  const cat=document.getElementById('f-cat').value;
  if(!name||isNaN(amount)||amount<=0||!date){alert('Merci de remplir tous les champs.');return;}
  transactions.push({id:Date.now(),type:currentTxType,name,amount,date,cat});
  transactions.sort((a,b)=>b.date.localeCompare(a.date));
  saveTx(); closeModal('modal-add-tx'); render();
}

// ---- MODALS ----
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeIfOutside(e,id){if(e.target.id===id)closeModal(id);}

// ---- LOYALTY ----
const COLORS=['cc0','cc1','cc2','cc3','cc4','cc5'];
function openAddLoyalty(){
  document.getElementById('loy-name').value='';
  document.getElementById('loy-code').value='';
  setCodeType('barcode');
  document.getElementById('modal-add-loyalty').classList.add('open');
}
function setCodeType(type){
  loyCodeType=type;
  document.getElementById('loy-btn-barcode').classList.toggle('active',type==='barcode');
  document.getElementById('loy-btn-qr').classList.toggle('active',type==='qr');
}
function saveLoyaltyCard(){
  const name=document.getElementById('loy-name').value.trim();
  const code=document.getElementById('loy-code').value.trim();
  if(!name||!code){alert('Merci de remplir tous les champs.');return;}
  loyaltyCards.push({id:Date.now(),name,code,codeType:loyCodeType,ci:loyaltyCards.length%6});
  saveLoy(); closeModal('modal-add-loyalty'); renderLoyalty();
}
function deleteLoyaltyCard(id){loyaltyCards=loyaltyCards.filter(c=>c.id!==id);saveLoy();renderLoyalty();}
function renderLoyalty(){
  const el=document.getElementById('loyalty-list');
  if(!loyaltyCards.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🎴</div>Aucune carte ajoutée.</div>`;return;}
  el.innerHTML=loyaltyCards.map(c=>`
    <div class="loyalty-card ${COLORS[c.ci||0]}" onclick="showLoyaltyCard(${c.id})">
      <button class="loy-delete" onclick="event.stopPropagation();deleteLoyaltyCard(${c.id})">×</button>
      <div class="loy-name">${c.name}</div>
      <div><div class="loy-code">${c.code}</div><div class="loy-type">${c.codeType==='qr'?'QR Code':'Code barre'}</div></div>
    </div>`).join('');
}
function showLoyaltyCard(id){
  const card=loyaltyCards.find(c=>c.id===id); if(!card)return;
  document.getElementById('show-loy-title').textContent=card.name;
  const content=document.getElementById('show-loy-content');
  if(card.codeType==='qr'){
    content.innerHTML=`<div class="qr-wrap"><canvas id="qr-canvas"></canvas></div><p style="font-size:13px;color:var(--muted);margin-bottom:4px">${card.code}</p>`;
    document.getElementById('modal-show-loyalty').classList.add('open');
    setTimeout(()=>drawQR(card.code),50);
  } else {
    content.innerHTML=`<div class="barcode-wrap"><svg id="barcode-svg"></svg><div class="barcode-num">${card.code}</div></div>`;
    document.getElementById('modal-show-loyalty').classList.add('open');
    setTimeout(()=>drawBarcode(card.code),50);
  }
}
function drawBarcode(text){
  const svg=document.getElementById('barcode-svg'),bw=2,h=80;
  let bars=[];
  for(let i=0;i<text.length;i++){text.charCodeAt(i).toString(2).padStart(8,'0').split('').forEach(v=>bars.push(v==='1'));}
  const ss=[true,false,true,true,false,true,false,true,true];
  const all=[...ss,false,...bars,false,...ss];
  const tw=all.length*bw;
  svg.setAttribute('width',Math.min(tw,260));svg.setAttribute('height',h);svg.setAttribute('viewBox',`0 0 ${tw} ${h}`);
  svg.innerHTML=all.map((f,i)=>f?`<rect x="${i*bw}" y="0" width="${bw}" height="${h}" fill="#000"/>`:'').join('');
}
function drawQR(text){
  const canvas=document.getElementById('qr-canvas'),sz=200;
  canvas.width=sz;canvas.height=sz;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='white';ctx.fillRect(0,0,sz,sz);
  const gs=21,cs=Math.floor(sz/gs);
  ctx.fillStyle='black';
  const hash=(s,i)=>{let h=0;for(let j=0;j<s.length;j++)h=(h*31+s.charCodeAt(j)+i)&0xffff;return h;};
  for(let r=0;r<gs;r++)for(let c=0;c<gs;c++){
    const inF=(r<8&&c<8)||(r<8&&c>=gs-8)||(r>=gs-8&&c<8);
    if(inF){const fr=r<8?r:r-(gs-8),fc=c<8?c:c-(gs-8);if(fr===0||fr===6||fc===0||fc===6||(fr>=2&&fr<=4&&fc>=2&&fc<=4))ctx.fillRect(c*cs,r*cs,cs,cs);}
    else if(hash(text,r*gs+c)%2===0)ctx.fillRect(c*cs,r*cs,cs,cs);
  }
}

// INIT
setTxType('expense');
render();
renderLoyalty();
</script>
